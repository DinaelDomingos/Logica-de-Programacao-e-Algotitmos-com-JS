<!-- Elaborar um programa que leia um número, calcule e informe os seus vizinhos, ou seja, o número anterior e o número posterior -->
<meta charset="utf-8">
<script>
  // lê um número
  const num = Number(prompt("Número: "))
  // calcula vizinhos
  const anterior = num - 1
  const posterior = num + 1
  // exibe a resposta
  alert(`Vizinhos: ${anterior} e ${posterior}`)
</script>
